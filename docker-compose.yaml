version: '3.8'

services:

  # --- INFRASTRUCTURE ---

  # For PostgresSQL Database
  db:
    image: postgres:15-alpine
    container_name: postgresdb
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - app-network
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Zipkin
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9411/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Asynchronic Communication Kafka with KRaft
  kafka:
    image: confluentinc/cp-kafka:8.1.1
    container_name: kafka-broker
    restart: unless-stopped
    ports:
      - "9092:9092"
    networks:
      - app-network
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: lcEE_0O5R_2ueRWWNGLdXg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 10s
      retries: 5

  # NoSQL database for logging and saving notifications
  mongo:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    networks:
      - app-network
    volumes:
      - mongo_data:/data/db

  # MongoDB UI
  mongo-express:
    image: mongo-express
    container_name: mongo-ui
    ports:
      - "8085:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    networks:
      - app-network
    depends_on:
      - mongo

#  redis:
#    image: redis:7-alpine
#    ports:
#      - "6379:6379"
#    restart: unless-stopped
#    networks:
#      - app-network

  # --- MICROSERVICES ---

  # user-service for managing users
  user-api:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-api
    depends_on:
      db:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    networks:
      - app-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_uNAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  # task-service for managing tasks
  task-api:
    build:
      context: .
      dockerfile: task-service/Dockerfile
    container_name: task-api
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_tNAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVICES_USER_SERVICE_URL: http://user-api:8080

  # notification-service for sending emails and logging notifications in MongoDB
  notification-api:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-api
    depends_on:
      zipkin:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - app-network
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_USERNAME: ${GMAIL_USER}
      SPRING_MAIL_PASSWORD: ${GMAIL_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://root:root@mongo:27017/notifications?authSource=admin

  # statistics-service for making stats about tasks
  statistics-service:
    build:
      context: .
      dockerfile: statistics-service/Dockerfile
    container_name: statistics-service
    depends_on:
      zipkin:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_uNAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092


  # entry-point for all services
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      - zipkin
      - user-api
      - task-api
      - notification-api


  # --- OBSERVABILITY ---

  # Getting metrics from services
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network

  # Getting logs for monitoring
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  # Getting metrics from prom and making graphs
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - app-network
    depends_on:
      - prometheus

volumes:
  db_data:
  kafka_data:
  mongo_data:

networks:
  app-network:
    driver: bridge