server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-api:8080
          predicates:
            - Path=/auth/**, /users/**

        - id: task-service
          uri: http://task-api:8080
          predicates:
            - Path=/tasks/**

        - id: notification-api
          uri: http://notification-api:8080
          predicates:
            - Path=/notifications/**